services:

  # ── MySQL (로컬 개발용) ────────────────────────────────────────────────────
  mysql:
    image: mysql:8.0
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:-rootpassword}
      MYSQL_DATABASE: ganadi_local
      MYSQL_USER: ganadi_user
      MYSQL_PASSWORD: ${DB_PASSWORD}
    volumes:
      - mysql_data:/var/lib/mysql
    networks:
      - ganadi-net
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-p${MYSQL_ROOT_PASSWORD:-rootpassword}"]
      interval: 10s
      timeout: 5s
      retries: 10

  # ── 백엔드 ────────────────────────────────────────────────────────────────
  backend:
    build:
      context: .
      dockerfile: Dockerfile
    env_file: .env
    environment:
      DATABASE_URL: mysql+pymysql://ganadi_user:${DB_PASSWORD}@mysql:3306/ganadi_local
      AI_SERVER_URL: http://ai:8000
    depends_on:
      mysql:
        condition: service_healthy
    volumes:
      - uploads_data:/app/uploads
    networks:
      - ganadi-net
    restart: unless-stopped

  # ── AI 서버 ───────────────────────────────────────────────────────────────
  ai:
    build:
      context: .
      dockerfile: Dockerfile.ai
    env_file: api/.env
    volumes:
      # .pth 파일은 이미지에 포함하지 않고 호스트 경로를 마운트
      - ./models/classifier/checkpoints:/app/models/classifier/checkpoints:ro
    networks:
      - ganadi-net
    restart: unless-stopped

  # ── 프론트엔드 ────────────────────────────────────────────────────────────
  frontend:
    build:
      context: ../GANADI-frontend
      dockerfile: Dockerfile
      args:
        VITE_API_URL: ${VITE_API_URL:-}
    networks:
      - ganadi-net
    restart: unless-stopped

  # ── Nginx (리버스 프록시) ─────────────────────────────────────────────────
  nginx:
    image: nginx:alpine
    ports:
      - "80:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - backend
      - frontend
      - ai
    networks:
      - ganadi-net
    restart: unless-stopped

networks:
  ganadi-net:
    driver: bridge

volumes:
  mysql_data:
  uploads_data:
